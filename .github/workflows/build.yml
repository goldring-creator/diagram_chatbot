name: Build desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # 수동 실행 버튼

permissions:
  contents: write   # Release에 빌드 파일 첨부 권한

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: DiagramChatbot-mac
          - os: windows-latest
            artifact: DiagramChatbot-windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: 소스코드
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        working-directory: 소스코드
        run: pyinstaller --noconfirm --windowed --name DiagramChatbot --collect-all pymupdf app.py

      - name: Zip (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: 소스코드
        # ditto는 심볼릭 링크·.app 구조를 보존한다. (zip -r은 링크를 원본으로 복제해
        # libmupdf.dylib 등이 4중 중복되며 용량이 3배로 부풀었다)
        run: ditto -c -k --keepParent dist/DiagramChatbot.app ../${{ matrix.artifact }}.zip

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path "소스코드/dist/DiagramChatbot/*" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
