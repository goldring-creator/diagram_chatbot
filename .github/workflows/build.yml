name: Build desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # 수동 실행 버튼

permissions:
  contents: write   # Release에 빌드 파일 첨부 권한

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: DiagramChatbot-mac
          - os: windows-latest
            artifact: DiagramChatbot-windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: ver
        shell: bash
        # 태그 푸시면 태그(v0.3.6→0.3.6), 수동 실행이면 app.py의 APP_VERSION을 쓴다
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V=$(grep -E '^APP_VERSION' "소스코드/app.py" | sed -E 's/.*"([0-9.]+)".*/\1/')
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Install dependencies
        working-directory: 소스코드
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: 소스코드
        env:
          APP_VER: ${{ steps.ver.outputs.version }}   # 스펙이 Info.plist에 주입
        run: pyinstaller --noconfirm --clean DiagramChatbot-mac.spec

      - name: Build app (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: 소스코드
        shell: bash
        run: |
          python make_win_version.py "${{ steps.ver.outputs.version }}" version_info.txt
          pyinstaller --noconfirm --windowed --name DiagramChatbot \
            --collect-all pymupdf --version-file version_info.txt app.py

      - name: Zip (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: 소스코드
        # ditto는 심볼릭 링크·.app 구조를 보존한다. (zip -r은 링크를 원본으로 복제해
        # libmupdf.dylib 등이 4중 중복되며 용량이 3배로 부풀었다)
        run: ditto -c -k --keepParent dist/DiagramChatbot.app ../${{ matrix.artifact }}.zip

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path "소스코드/dist/DiagramChatbot/*" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
